name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run tests
        run: >-
          xcodebuild test
          -project AiUsage.xcodeproj
          -scheme AiUsage
          -destination 'platform=macOS'
          CODE_SIGN_IDENTITY=-
          CODE_SIGN_STYLE=Manual
          DEVELOPMENT_TEAM=''
