name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    runs-on: macos-26
    timeout-minutes: 20
    outputs:
      build_number: ${{ steps.version.outputs.build_number }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Validate tag, branch, and version
        id: version
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          version="${TAG_NAME#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected a semantic version tag such as v1.0.0" >&2
            exit 1
          fi

          git fetch --no-tags origin main:refs/remotes/origin/main
          tag_commit="$(git rev-parse "${TAG_NAME}^{commit}")"
          if [[ "$tag_commit" != "$(git rev-parse HEAD)" ]]; then
            echo "Checked-out commit does not match $TAG_NAME" >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "$tag_commit" origin/main; then
            echo "$TAG_NAME must point to a commit on origin/main" >&2
            exit 1
          fi

          build_settings="$(
            xcodebuild -project AiUsage.xcodeproj -scheme AiUsage \
              -configuration Release -showBuildSettings
          )"
          project_version="$(
            awk '/MARKETING_VERSION =/ { print $3; exit }' <<< "$build_settings"
          )"
          project_build="$(
            awk '/CURRENT_PROJECT_VERSION =/ { print $3; exit }' <<< "$build_settings"
          )"
          if [[ "$project_version" != "$version" ]]; then
            echo "Tag version $version does not match MARKETING_VERSION $project_version" >&2
            exit 1
          fi
          if [[ ! "$project_build" =~ ^[1-9][0-9]*$ ]]; then
            echo "CURRENT_PROJECT_VERSION must be a positive integer" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "build_number=$project_build" >> "$GITHUB_OUTPUT"

      - name: Run tests with ad-hoc signing
        run: >-
          xcodebuild test
          -project AiUsage.xcodeproj
          -scheme AiUsage
          -destination 'platform=macOS'
          -derivedDataPath "$RUNNER_TEMP/TestDerivedData"
          CODE_SIGN_IDENTITY=-
          CODE_SIGN_STYLE=Manual
          DEVELOPMENT_TEAM=''

  release:
    needs: validate
    environment: release
    permissions:
      contents: write
    runs-on: macos-26
    timeout-minutes: 90
    env:
      BUILD_NUMBER: ${{ needs.validate.outputs.build_number }}
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Import Developer ID certificate and notary key
        shell: bash
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          required_secrets=(
            APPLE_CERTIFICATE_P12_BASE64
            APPLE_CERTIFICATE_PASSWORD
            APPLE_TEAM_ID
            APPLE_API_KEY_P8_BASE64
            APPLE_API_KEY_ID
            APPLE_API_ISSUER_ID
            SPARKLE_PRIVATE_KEY
          )
          for name in "${required_secrets[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required release secret: $name" >&2
              exit 1
            fi
          done

          certificate_path="$RUNNER_TEMP/developer-id-application.p12"
          notary_key_path="$RUNNER_TEMP/notary-api-key.p8"
          signing_keychain="$RUNNER_TEMP/aiusage-signing.keychain-db"
          keychain_password="$(openssl rand -base64 32)"
          echo "::add-mask::$keychain_password"

          printf '%s' "$APPLE_CERTIFICATE_P12_BASE64" \
            | /usr/bin/base64 --decode > "$certificate_path"
          printf '%s' "$APPLE_API_KEY_P8_BASE64" \
            | /usr/bin/base64 --decode > "$notary_key_path"
          chmod 600 "$certificate_path" "$notary_key_path"

          security create-keychain -p "$keychain_password" "$signing_keychain"
          security set-keychain-settings -lut 7200 "$signing_keychain"
          security unlock-keychain -p "$keychain_password" "$signing_keychain"
          security import "$certificate_path" \
            -k "$signing_keychain" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 >/dev/null
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$keychain_password" \
            "$signing_keychain" >/dev/null
          security list-keychains -d user -s "$signing_keychain"

          identity_count="$(
            security find-identity -v -p codesigning "$signing_keychain" \
              | awk '/Developer ID Application:/ { count++ } END { print count + 0 }'
          )"
          if [[ "$identity_count" != "1" ]]; then
            echo "Expected exactly one Developer ID Application identity" >&2
            exit 1
          fi
          signing_identity="$(
            security find-identity -v -p codesigning "$signing_keychain" \
              | awk '/Developer ID Application:/ { print $2; exit }'
          )"
          if [[ ! "$signing_identity" =~ ^[[:xdigit:]]{40}$ ]]; then
            echo "Could not resolve the Developer ID Application identity" >&2
            exit 1
          fi

          echo "CERTIFICATE_PATH=$certificate_path" >> "$GITHUB_ENV"
          echo "NOTARY_KEY_PATH=$notary_key_path" >> "$GITHUB_ENV"
          echo "SIGNING_IDENTITY=$signing_identity" >> "$GITHUB_ENV"
          echo "SIGNING_KEYCHAIN=$signing_keychain" >> "$GITHUB_ENV"

      - name: Build unsigned universal app
        run: >-
          xcodebuild build
          -project AiUsage.xcodeproj
          -scheme AiUsage
          -configuration Release
          -destination 'generic/platform=macOS'
          -derivedDataPath "$RUNNER_TEMP/ReleaseDerivedData"
          ARCHS='arm64 x86_64'
          ONLY_ACTIVE_ARCH=NO
          ENABLE_CODE_COVERAGE=NO
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO

      - name: Sign and verify before notarization
        shell: bash
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          app="$RUNNER_TEMP/ReleaseDerivedData/Build/Products/Release/AiUsage.app"
          test -d "$app"
          sparkle="$app/Contents/Frameworks/Sparkle.framework"
          test -d "$sparkle"
          codesign --force \
            --keychain "$SIGNING_KEYCHAIN" \
            --options runtime \
            --sign "$SIGNING_IDENTITY" \
            --timestamp \
            "$sparkle/Versions/Current/Autoupdate"
          codesign --force \
            --keychain "$SIGNING_KEYCHAIN" \
            --options runtime \
            --sign "$SIGNING_IDENTITY" \
            --timestamp \
            "$sparkle/Versions/Current/XPCServices/Downloader.xpc"
          codesign --force \
            --keychain "$SIGNING_KEYCHAIN" \
            --options runtime \
            --sign "$SIGNING_IDENTITY" \
            --timestamp \
            "$sparkle/Versions/Current/XPCServices/Installer.xpc"
          codesign --force \
            --keychain "$SIGNING_KEYCHAIN" \
            --options runtime \
            --sign "$SIGNING_IDENTITY" \
            --timestamp \
            "$sparkle/Versions/Current/Updater.app"
          codesign --force \
            --keychain "$SIGNING_KEYCHAIN" \
            --options runtime \
            --sign "$SIGNING_IDENTITY" \
            --timestamp \
            "$sparkle"
          codesign --force \
            --keychain "$SIGNING_KEYCHAIN" \
            --options runtime \
            --sign "$SIGNING_IDENTITY" \
            --timestamp \
            "$app"

          codesign --verify --deep --strict --verbose=2 "$app"
          signature_info="$(codesign -d --verbose=4 "$app" 2>&1)"
          grep -q '^Authority=Developer ID Application:' <<< "$signature_info"
          grep -Fqx "TeamIdentifier=$APPLE_TEAM_ID" <<< "$signature_info"
          grep -q 'flags=.*runtime' <<< "$signature_info"
          grep -q '^Timestamp=' <<< "$signature_info"
          grep -Fqx 'Identifier=com.j3s30p.AiUsage' <<< "$signature_info"

          entitlements="$(codesign -d --entitlements :- "$app" 2>/dev/null || true)"
          if grep -q 'com.apple.security.get-task-allow' <<< "$entitlements"; then
            echo "Release signature must not contain get-task-allow" >&2
            exit 1
          fi

          lipo "$app/Contents/MacOS/AiUsage" -verify_arch arm64 x86_64
          if otool -l "$app/Contents/MacOS/AiUsage" \
            | grep -Eq '__llvm_prf_|__llvm_cov|__LLVM_COV'; then
            echo "Release binary must not contain LLVM coverage instrumentation" >&2
            exit 1
          fi
          bundled_helper="$app/Contents/Resources/claude-statusline-aiusage.sh"
          test -f "$bundled_helper"
          cmp Scripts/claude-statusline-aiusage.sh "$bundled_helper"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' \
            "$app/Contents/Info.plist")" = "$VERSION"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' \
            "$app/Contents/Info.plist")" = "$BUILD_NUMBER"
          test "$(/usr/libexec/PlistBuddy -c 'Print :SUFeedURL' \
            "$app/Contents/Info.plist")" \
            = 'https://github.com/j3s30p/AI_Usage/releases/latest/download/appcast.xml'
          test "$(/usr/libexec/PlistBuddy -c 'Print :SUPublicEDKey' \
            "$app/Contents/Info.plist")" \
            = 'VwUB6fha9lNZYJFW2RyBD0mM2fM/izDvjD2UqSm2tC8='

          echo "APP_PATH=$app" >> "$GITHUB_ENV"

      - name: Notarize and staple app
        shell: bash
        env:
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          set -euo pipefail

          notary_archive="$RUNNER_TEMP/AiUsage-notarization.zip"
          response="$RUNNER_TEMP/notary-response.json"
          log="$RUNNER_TEMP/notary-log.json"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$notary_archive"

          submit_exit=0
          xcrun notarytool submit "$notary_archive" \
            --key "$NOTARY_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait \
            --timeout 60m \
            --output-format json > "$response" || submit_exit=$?

          submission_id="$(jq -r '.id // empty' "$response" 2>/dev/null || true)"
          submission_status="$(jq -r '.status // empty' "$response" 2>/dev/null || true)"
          if [[ -n "$submission_id" ]]; then
            xcrun notarytool log "$submission_id" "$log" \
              --key "$NOTARY_KEY_PATH" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER_ID" || true
          fi
          if [[ -s "$log" ]]; then
            issue_count="$(jq '[.issues[]?] | length' "$log")"
            error_count="$(jq '[.issues[]? | select(.severity == "error")] | length' "$log")"
            echo "Notarization log: $issue_count issue(s), $error_count error(s)"
            jq -r '.issues[]? | "\(.severity): \(.path // "unknown path"): \(.message)"' \
              "$log"
          else
            error_count=0
          fi

          if [[ "$submit_exit" != "0" || "$submission_status" != "Accepted" ]]; then
            echo "Apple notarization was not accepted" >&2
            exit 1
          fi
          if [[ "$error_count" != "0" ]]; then
            echo "Apple notarization log contains errors" >&2
            exit 1
          fi

          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"

      - name: Package and verify final release
        id: package
        shell: bash
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          release_dir="$RUNNER_TEMP/release"
          verify_dir="$RUNNER_TEMP/final-verify"
          artifact_name="AiUsage-v$VERSION-macos-universal.zip"
          checksum_name="$artifact_name.sha256"
          artifact="$release_dir/$artifact_name"
          checksum="$release_dir/$checksum_name"

          rm -rf "$release_dir" "$verify_dir"
          mkdir -p "$release_dir" "$verify_dir"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$artifact"
          ditto -x -k "$artifact" "$verify_dir"

          verified_app="$verify_dir/AiUsage.app"
          codesign --verify --deep --strict --verbose=2 "$verified_app"
          signature_info="$(codesign -d --verbose=4 "$verified_app" 2>&1)"
          grep -q '^Authority=Developer ID Application:' <<< "$signature_info"
          grep -Fqx "TeamIdentifier=$APPLE_TEAM_ID" <<< "$signature_info"
          grep -q 'flags=.*runtime' <<< "$signature_info"
          grep -q '^Timestamp=' <<< "$signature_info"
          grep -Fqx 'Identifier=com.j3s30p.AiUsage' <<< "$signature_info"

          entitlements="$(codesign -d --entitlements :- "$verified_app" 2>/dev/null || true)"
          if grep -q 'com.apple.security.get-task-allow' <<< "$entitlements"; then
            echo "Final release must not contain get-task-allow" >&2
            exit 1
          fi

          lipo "$verified_app/Contents/MacOS/AiUsage" -verify_arch arm64 x86_64
          if otool -l "$verified_app/Contents/MacOS/AiUsage" \
            | grep -Eq '__llvm_prf_|__llvm_cov|__LLVM_COV'; then
            echo "Final release must not contain LLVM coverage instrumentation" >&2
            exit 1
          fi
          xcrun stapler validate "$verified_app"
          spctl --assess --type execute --verbose=4 "$verified_app"
          bundled_helper="$verified_app/Contents/Resources/claude-statusline-aiusage.sh"
          test -f "$bundled_helper"
          cmp Scripts/claude-statusline-aiusage.sh "$bundled_helper"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' \
            "$verified_app/Contents/Info.plist")" = "$VERSION"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' \
            "$verified_app/Contents/Info.plist")" = "$BUILD_NUMBER"

          (
            cd "$release_dir"
            shasum -a 256 "$artifact_name" > "$checksum_name"
          )
          test -s "$checksum"
          echo "artifact=$artifact" >> "$GITHUB_OUTPUT"
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"

      - name: Generate signed Sparkle appcast
        id: appcast
        shell: bash
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          appcast_dir="$RUNNER_TEMP/appcast"
          appcast="$appcast_dir/appcast.xml"
          artifact="${{ steps.package.outputs.artifact }}"
          artifact_name="$(basename "$artifact")"
          generate_appcast="$RUNNER_TEMP/ReleaseDerivedData/SourcePackages/artifacts/sparkle/Sparkle/bin/generate_appcast"

          rm -rf "$appcast_dir"
          mkdir -p "$appcast_dir"
          cp "$artifact" "$appcast_dir/$artifact_name"
          printf '%s' "$SPARKLE_PRIVATE_KEY" \
            | "$generate_appcast" \
              --ed-key-file - \
              --download-url-prefix "https://github.com/j3s30p/AI_Usage/releases/download/$GITHUB_REF_NAME/" \
              --link 'https://github.com/j3s30p/AI_Usage' \
              "$appcast_dir"

          test -s "$appcast"
          grep -Fq "url=\"https://github.com/j3s30p/AI_Usage/releases/download/$GITHUB_REF_NAME/$artifact_name\"" "$appcast"
          grep -Fq "<sparkle:version>$BUILD_NUMBER</sparkle:version>" "$appcast"
          grep -Fq "<sparkle:shortVersionString>$VERSION</sparkle:shortVersionString>" "$appcast"
          grep -q 'sparkle:edSignature=' "$appcast"
          echo "appcast=$appcast" >> "$GITHUB_OUTPUT"

      - name: Remove temporary signing credentials
        if: ${{ always() }}
        shell: bash
        run: |
          signing_keychain="${SIGNING_KEYCHAIN:-$RUNNER_TEMP/aiusage-signing.keychain-db}"
          security delete-keychain "$signing_keychain" >/dev/null 2>&1 \
            || rm -f "$signing_keychain"
          rm -f \
            "${CERTIFICATE_PATH:-$RUNNER_TEMP/developer-id-application.p12}" \
            "${NOTARY_KEY_PATH:-$RUNNER_TEMP/notary-api-key.p8}" \
            "$RUNNER_TEMP/AiUsage-notarization.zip" \
            "$RUNNER_TEMP/notary-response.json" \
            "$RUNNER_TEMP/notary-log.json"

      - name: Publish stable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT: ${{ steps.package.outputs.artifact }}
          CHECKSUM: ${{ steps.package.outputs.checksum }}
          APPCAST: ${{ steps.appcast.outputs.appcast }}
        run: |
          gh release create "$GITHUB_REF_NAME" "$ARTIFACT" "$CHECKSUM" "$APPCAST" \
            --generate-notes \
            --latest \
            --notes "Developer ID signed and Apple notarized macOS release." \
            --title "AiUsage $GITHUB_REF_NAME" \
            --verify-tag
